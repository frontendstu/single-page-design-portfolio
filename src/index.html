<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Frontend Mentor &vert; Single Page Design Portfolio</title>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header wrapper">
      <div class="header__branding">
        <img src="assets/images/logo.svg" alt />
      </div>

      <div class="header__btn">
        <button class="btn" data-btn-style="primary">Free Consultation</button>
      </div>
    </header>

    <section class="hero wrapper | text-centre" aria-labelledby="#hero-title">
      <h1 id="hero-title" class="title">Design solutions made easy</h1>

      <div class="hero__copy">
        <p>
          With over ten years of experience in various design disciplines, I'm
          your one-stop shop for your design needs.
        </p>
      </div>
    </section>

    <main>
      <section class="grid wrapper">
        <div class="grid__item | bg-purple">
          <img src="assets/images/pattern-graphic-design.svg" alt />
          <h2 class="title">Graphic Design</h2>
        </div>

        <div class="grid__item | bg-orange">
          <img src="assets/images/pattern-ui-ux.svg" alt />
          <h2 class="title">UI/UX</h2>
        </div>

        <div class="grid__item | bg-pink">
          <img src="assets/images/pattern-apps.svg" alt />
          <h2 class="title">Apps</h2>
        </div>

        <div class="grid__item | bg-red">
          <img src="assets/images/pattern-illustrations.svg" alt />
          <h2 class="title">Illustrations</h2>
        </div>

        <div class="grid__item | bg-teal">
          <img src="assets/images/pattern-photography.svg" alt />
          <h2 class="title">Photography</h2>
        </div>

        <div class="grid__item | bg-royal">
          <img src="assets/images/pattern-motion-graphics.svg" alt />
          <h2 class="title">Motion Graphics</h2>
        </div>
      </section>
    </main>

    <script src="js/scripts.js"></script>
  </body>
</html>
